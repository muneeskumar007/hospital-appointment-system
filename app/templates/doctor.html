<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
</head>

<body style="margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#e3f2fd,#f1f8ff);">

<!-- Header -->
<div style="background:#1976d2;color:white;padding:20px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.2);">
    <h1 style="margin:0;">🏥 Doctors List</h1>
</div>

<!-- Container -->
<div style="width:90%;max-width:1000px;margin:40px auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;">

{% for doctor in doctors %}

<!-- Doctor Card -->
<div style="
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
">

<!-- <img src="/static/images/doc1.jpg"> -->

<h3 style="margin-top:0;color:#1976d2;">👨‍⚕️ Dr {{ doctor.name }}</h3>

<p style="margin:6px 0;color:#444;">
<strong>Specialty:</strong> {{ doctor.specialty }}
</p>

<p style="margin:6px 0;color:#444;">
<strong>Experience:</strong> {{ doctor.experience }} years
</p>

<p style="margin:6px 0;color:#444;">
<strong>Consultation Fee:</strong> ₹{{ doctor.fee }}
</p>

<br>

<a href="/doctor/{{ doctor.id }}"
style="
display:inline-block;
text-decoration:none;
background:#1976d2;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
transition:0.3s;
">
View Profile
</a>

</div>

{% endfor %}

</div>

</body>
</html>
