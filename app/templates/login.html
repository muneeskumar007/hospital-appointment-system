<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

.login-container{
width:400px;
margin:auto;
margin-top:100px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.login-container h2{
text-align:center;
margin-bottom:30px;
}

.input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.btn-login{
width:100%;
padding:12px;
background:#2d6cdf;
border:none;
color:white;
border-radius:5px;
font-size:16px;
}

.btn-login:hover{
background:#1c4fb6;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Patient Login</h2>

<form method="POST">

<input class="input" type="email" name="email" placeholder="Email" required>

<input class="input" type="password" name="password" placeholder="Password" required>

<button class="btn-login">Login</button>

</form>

<p style="text-align:center;margin-top:15px;">
No account?
<a href="/register">Register</a>
</p>

</div>

</body>
</html>
