<h2>Book Appointment</h2>

<form method="POST" action="/book">

<input type="text" name="patient_id" placeholder="Patient ID">

<input type="text" name="doctor_id" placeholder="Doctor ID">

<input type="date" name="date">

<input type="time" name="time">

<button type="submit">Book Appointment</button>

</form>


<h2>My Appointments</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Action</th>
</tr>

{% for a in appointments %}

<tr>
<td>{{a[0]}}</td>
<td>{{a[2]}}</td>
<td>{{a[3]}}</td>
<td>{{a[4]}}</td>

<td>
<a href="/cancel/{{a[0]}}">Cancel</a>
</td>

</tr>

{% endfor %}

</table>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <nav>
        <h2>🏥 HospitalCare</h2>

        <div>
            <a href="/patient_dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>
</header>

<section class="form-section">

    <h2>Book an Appointment</h2>

    <form method="POST" action="/appointment">

        <label>Select Doctor</label>
        <select name="doctor" required>
            <option value="">-- Choose Doctor --</option>
            <option value="Dr. Smith">Dr. Smith</option>
            <option value="Dr. John">Dr. John</option>
            <option value="Dr. Patel">Dr. Patel</option>
        </select>

        <label>Appointment Date</label>
        <input type="date" name="date" required>

        <label>Appointment Time</label>
        <input type="time" name="time" required>

        <label>Symptoms / Reason</label>
        <textarea name="symptoms" placeholder="Describe your problem" required></textarea>

        <button type="submit">Book Appointment</button>

    </form>

</section>

</body>
</html>
