<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>
</head>

<body style="margin:0;font-family:Arial;background:#f4f6f9;">

<div style="background:#1976d2;color:white;padding:20px;text-align:center;">
<h1>👨‍⚕️ Doctor Profile</h1>
</div>

<div style="width:400px;margin:60px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 6px 15px rgba(0,0,0,0.2);">

<h2 style="color:#1976d2;">Dr {{ doctor.name }}</h2>

<p><b>Specialty:</b> {{ doctor.specialty }}</p>

<p><b>Experience:</b> {{ doctor.experience }} years</p>

<p><b>Consultation Fee:</b> ₹{{ doctor.fee }}</p>

<br>

<a href="/doctors"
style="background:#1976d2;color:white;padding:10px 15px;text-decoration:none;border-radius:6px;">
Back to Doctors
</a>

</div>

</body>
</html>
