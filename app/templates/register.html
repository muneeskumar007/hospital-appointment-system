<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="auth-page">

<div class="bg-animation"></div>

<div class="auth-container">

<div class="auth-left">

<h2>Join Our Healthcare Community</h2>
<p>Create your account for easy appointment booking</p>

<!-- <img src="{{ url_for('static', filename='images/doctor1.webp') }}"> -->

</div>

<div class="auth-right">

<h2>Register</h2>

<title>Register</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="auth-container">

<div class="auth-tabs">

<a href="/register">
<button class="active">New Patient</button>
</a>

<a href="/login">
<button>Existing Patient</button>
</a>

</div>

<form method="POST" class="auth-form">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<select name="role" required>
<option value="">Select Role</option>
<option value="patient">Patient</option>
<option value="doctor">Doctor</option>
</select>

<button class="auth-btn">Create Account</button>

</form>

<div class="auth-link">
<a href="/login">Already have an account? Login</a>
</div>

</div>

</div>

</body>
</html>

</div>

</body>
</html>
